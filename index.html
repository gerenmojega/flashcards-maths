<!DOCTYPE html>
<html lang="fr">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards Mathématiques</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --bg-color: #ecf0f1;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 {
            color: var(--primary-color);
            font-size: 1.5rem;
            text-align: center;
        }
        .progress {
            margin-bottom: 20px;
            color: #7f8c8d;
            font-weight: bold;
        }
        .scene {
            width: 100%;
            max-width: 400px;
            height: 250px;
            perspective: 1000px;
            margin-bottom: 30px;
        }
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 15px;
        }
        .card.is-flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 15px;
            background-color: var(--card-bg);
            text-align: center;
            font-size: 1.2rem;
            color: var(--primary-color);
        }
        .card-face-back {
            transform: rotateY(180deg);
            background-color: var(--secondary-color);
            color: white;
            border: 2px solid var(--secondary-color);
        }
        .controls {
            display: flex;
            gap: 15px;
        }
        button {
            padding: 12px 24px;
            font-size: 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #1a252f;
        }
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>Révisions Mathématiques</h1>
    <div class="progress" id="progress">Carte 1 / X</div>

    <div class="scene">
        <div class="card" id="flashcard" onclick="flipCard()">
            <div class="card-face card-face-front" id="question">
                </div>
            <div class="card-face card-face-back" id="answer">
                </div>
        </div>
    </div>

    <div class="controls">
        <button id="btn-prev" onclick="prevCard()">Précédent</button>
        <button id="btn-next" onclick="nextCard()">Suivant</button>
    </div>

    <script>
        // TES CARTES : Tu peux en ajouter autant que tu veux ici en utilisant la syntaxe LaTeX entre \( et \



           const flashcards = [
            // === 1. PRODUITS REMARQUABLES ===
            { q: "Que vaut \\( (a \\pm b)^{2} \\) ?", a: "\\( a^{2} \\pm 2ab + b^{2} \\)" },
            { q: "Que vaut \\( (a \\pm b)^{3} \\) ?", a: "\\( a^{3} \\pm 3a^{2}b + 3ab^{2} \\pm b^{3} \\)" },
            { q: "Que vaut \\( a^{2} - b^{2} \\) ?", a: "\\( (a + b)(a - b) \\)" },
            { q: "Que vaut \\( a^{3} \\pm b^{3} \\) ?", a: "\\( (a \\pm b)(a^{2} \\mp ab + b^{2}) \\)" },
            { q: "Que vaut \\( (a + b + c)^{2} \\) ?", a: "\\( a^{2} + b^{2} + c^{2} + 2ab + 2ac + 2bc \\)" },

            // === 2. PUISSANCES ===
            { q: "Que vaut \\( a^{m} \\cdot a^{p} \\) ?", a: "\\( a^{m + p} \\)" },
            { q: "Que vaut \\( \\frac{a^{m}}{a^{p}} \\) ?", a: "\\( a^{m - p} \\)" },
            { q: "Que vaut \\( (ab)^{m} \\) ?", a: "\\( a^{m} \\cdot b^{m} \\)" },
            { q: "Que vaut \\( \\left(\\frac{a}{b}\\right)^{m} \\) ?", a: "\\( \\frac{a^{m}}{b^{m}} \\)" },
            { q: "Que vaut \\( (a^{m})^{p} \\) ?", a: "\\( a^{m \\cdot p} \\)" },
            { q: "Que vaut \\( a^{0} \\) ?", a: "\\( 1 \\)" },
            { q: "Comment écrire \\( a^{-m} \\) sans exposant négatif ?", a: "\\( \\frac{1}{a^{m}} \\)" },

            // === 3. RACINES ===
            { q: "Condition d'équivalence : \\( \\sqrt[n]{a} = b \\iff \\) ?", a: "\\( b^{n} = a \\)" },
            { q: "Que vaut \\( \\sqrt[n]{ab} \\) ?", a: "\\( \\sqrt[n]{a} \\cdot \\sqrt[n]{b} \\)" },
            { q: "Que vaut \\( \\sqrt[n]{\\frac{a}{b}} \\) ?", a: "\\( \\frac{\\sqrt[n]{a}}{\\sqrt[n]{b}} \\)" },
            { q: "Simplification d'indice : \\( \\sqrt[np]{a^{mp}} \\) ?", a: "\\( \\sqrt[n]{a^{m}} \\)" },
            { q: "Que donne une racine de racine : \\( \\sqrt[n]{\\sqrt[p]{a}} \\) ?", a: "\\( \\sqrt[n \\cdot p]{a} \\)" },
            { q: "Comment écrire \\( \\sqrt[n]{a^{p}} \\) sous forme d'exposant fractionnaire ?", a: "\\( a^{\\frac{p}{n}} \\)" },

            // === 4. SUITES ARITHMÉTIQUES & MOYENNE ARITHMÉTIQUE ===
            { q: "Définition par récurrence d'une suite arithmétique : \\( t_{n+1} = \\) ?", a: "\\( t_{n} + r \\)" },
            { q: "Terme général de rang \\( n \\) d'une suite arithmétique : \\( t_{n} = \\) ?", a: "\\( t_{1} + (n - 1).r \\)" },
            { q: "Somme des \\( n \\) premiers termes d'une suite arithmétique : \\( S_{n} = \\) ?", a: "\\( \\frac{n(t_{1} + t_{n})}{2} \\)" },
            { q: "Formule de la moyenne arithmétique \\( A \\) ?", a: "\\( \\frac{x_{1} + x_{2} + \\dots + x_{n}}{n} \\)" },

            // === 5. SUITES GÉOMÉTRIQUES & MOYENNES ===
            { q: "Définition par récurrence d'une suite géométrique : \\( t_{n+1} = \\) ?", a: "\\( t_{n} \\cdot q \\)" },
            { q: "Terme général de rang \\( n \\) d'une suite géométrique : \\( t_{n} = \\) ?", a: "\\( t_{1} \\cdot q^{n-1} \\)" },
            { q: "Somme des \\( n \\) premiers termes d'une suite géométrique : \\( S_{n} = \\) ?", a: "\\( t_{1} \\cdot \\frac{q^{n} - 1}{q - 1} \\)" },
            { q: "Limite de la somme d'une suite géométrique infinie si \\( |q| < 1 \\) ?", a: "\\( \\lim_{n \\to +\\infty} S_{n} = \\frac{t_{1}}{1 - q} \\)" },
            { q: "Formule de la moyenne géométrique \\( G \\) ?", a: "\\( \\sqrt[n]{x_{1} \\cdot x_{2} \\cdot \\dots \\cdot x_{n}} \\)" },
            { q: "Formule de la moyenne harmonique \\( H \\) ?", a: "\\( \\frac{n}{\\frac{1}{x_{1}} + \\frac{1}{x_{2}} + \\dots + \\frac{1}{x_{n}}} \\)" },

            // === 6. FONCTIONS DU PREMIER DEGRÉ ===
            { q: "Quelle est l'équation d'une fonction linéaire ?", a: "\\( y = mx \\)" },
            { q: "Quelle est l'équation d'une fonction affine ?", a: "\\( y = mx + p \\)" },
            { q: "Quelle est l'équation d'une fonction constante ?", a: "\\( y = p \\)" },
            { q: "Sens de variation d'une droite selon sa pente \\( m \\) ?", a: "\\( m > 0 \\implies \\text{Croissante} \\\\ m < 0 \\implies \\text{Décroissante} \\)" },

            // === 7. FONCTIONS & ÉQUATIONS DU SECOND DEGRÉ ===
            { q: "Quelle est la forme générale d'une fonction du second degré ?", a: "\\( f(x) = ax^{2} + bx + c \\quad (a \\neq 0) \\)" },
            { q: "Quelle est la formule du discriminant \\( \\Delta \\) ?", a: "\\( \\Delta = b^{2} - 4ac \\)" },
            { q: "Quelles sont les coordonnées du sommet \\( S \\) d'une parabole ?", a: "\\( S\\left(\\frac{-b}{2a} ; \\frac{-\\Delta}{4a}\\right) \\)" },
            { q: "Quelles sont les solutions de \\( ax^{2}+bx+c=0 \\) si \\( \\Delta > 0 \\) ?", a: "\\( x_{1,2} = \\frac{-b \\pm \\sqrt{\\Delta}}{2a} \\)" },
            { q: "Quelle est la solution unique si \\( \\Delta = 0 \\) ?", a: "\\( x = \\frac{-b}{2a} \\)" },
            { q: "Que se passe-t-il pour l'équation si \\( \\Delta < 0 \\) ?", a: "\\( S = \\emptyset \\quad (\\text{Équation impossible dans } \\mathbb{R}) \\)" },
            { q: "Que vaut la somme des racines \\( x_{1} + x_{2} \\) ?", a: "\\( -\\frac{b}{a} \\)" },
            { q: "Que vaut le produit des racines \\( x_{1} \\cdot x_{2} \\) ?", a: "\\( \\frac{c}{a} \\)" },
            { q: "Comment factoriser le trinôme si \\( \\Delta > 0 \\) ?", a: "\\( a(x - x_{1})(x - x_{2}) \\)" },
            { q: "Comment factoriser le trinôme si \\( \\Delta = 0 \\) ?", a: "\\( a(x - x_{1})^{2} \\)" },

            // === 8. FONCTIONS LOGARITHMES ===
            { q: "Que vaut \\( \\log_{a}(x \\cdot y) \\) ?", a: "\\( \\log_{a} x + \\log_{a} y \\)" },
            { q: "Que vaut \\( \\log_{a}\\left(\\frac{x}{y}\\right) \\) ?", a: "\\( \\log_{a} x - \\log_{a} y \\)" },
            { q: "Que vaut \\( \\log_{a}(x^{n}) \\) ?", a: "\\( n \\cdot \\log_{a} x \\)" },
            { q: "Formules de changement de base pour \\( \\log_{a} x \\) ?", a: "\\( \\frac{\\log_{b} x}{\\log_{b} a} = \\frac{\\ln x}{\\ln a} \\)" },
            { q: "Que valent les simplifications réciproques \\( \\log_{a}(a^{x}) \\) et \\( \\ln(e^{x}) \\) ?", a: "\\( x \\)" },
            { q: "Que valent \\( a^{\\log_{a} x} \\) et \\( e^{\\ln x} \\) ?", a: "\\( x \\)" },
            { q: "Comment écrire \\( a^{x} \\) en base naturelle \\( e \\) ?", a: "\\( e^{x \\cdot \\ln a} \\)" },

            // === 9. TRIGONOMÉTRIE : RELATIONS FONDAMENTALES ===
            { q: "Définition de \\( \\tan \\alpha \\) et \\( \\cotg \\alpha \\) ?", a: "\\( \\tan \\alpha = \\frac{\\sin \\alpha}{\\cos \\alpha} \\quad \\text{et} \\quad \\cotg \\alpha = \\frac{\\cos \\alpha}{\\sin \\alpha} \\)" },
            { q: "Définition de la sécante \\( \\sec \\alpha \\) et cosécante \\( \\csc \\alpha \\) ?", a: "\\( \\sec \\alpha = \\frac{1}{\\cos \\alpha} \\quad \\text{et} \\quad \\csc \\alpha = \\frac{1}{\\sin \\alpha} \\)" },
            { q: "Quelle est la relation fondamentale de la trigonométrie ?", a: "\\( \\sin^{2} \\alpha + \\cos^{2} \\alpha = 1 \\)" },
            { q: "Relation entre tangente et sécante : \\( 1 + \\tan^{2} \\alpha = \\) ?", a: "\\( \\frac{1}{\\cos^{2} \\alpha} \\)" },
            { q: "Relation entre cotangente et cosécante : \\( 1 + \\cotg^{2} \\alpha = \\) ?", a: "\\( \\frac{1}{\\sin^{2} \\alpha} \\)" },

            // === 10. TRIGONOMÉTRIE : FORMULES D'ADDITION & DUPLICATION ===
            { q: "Formule d'addition : \\( \\sin(\\alpha \\pm \\beta) = \\) ?", a: "\\( \\sin \\alpha \\cos \\beta \\pm \\cos \\alpha \\sin \\beta \\)" },
            { q: "Formule d'addition : \\( \\cos(\\alpha \\pm \\beta) = \\) ?", a: "\\( \\cos \\alpha \\cos \\beta \\mp \\sin \\alpha \\sin \\beta \\)" },
            { q: "Formule d'addition : \\( \\tan(\\alpha \\pm \\beta) = \\) ?", a: "\\( \\frac{\\tan \\alpha \\pm \\tan \\beta}{1 \\mp \\tan \\alpha \\tan \\beta} \\)" },
            { q: "Formule d'addition : \\( \\cotg(\\alpha \\pm \\beta) = \\) ?", a: "\\( \\frac{\\cotg \\alpha \\cotg \\beta \\mp 1}{\\cotg \\beta \\pm \\cotg \\alpha} \\)" },
            { q: "Formule de duplication : \\( \\sin 2\\alpha = \\) ?", a: "\\( 2 \\sin \\alpha \\cos \\alpha \\)" },
            { q: "Formule de duplication : \\( \\cos 2\\alpha = \\) ?", a: "\\( \\cos^{2} \\alpha - \\sin^{2} \\alpha \\)" },
            { q: "Formule de duplication : \\( \\tan 2\\alpha = \\) ?", a: "\\( \\frac{2 \\tan \\alpha}{1 - \\tan^{2} \\alpha} \\)" }
        ];

        // Fonction pour mélanger aléatoirement les flashcards
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // On mélange les cartes dès le chargement de la page
        shuffle(flashcards);

        let currentIndex = 0;

        function updateCard() {
            const card = document.getElementById('flashcard');
            const qElement = document.getElementById('question');
            const aElement = document.getElementById('answer');
            const progress = document.getElementById('progress');

            // Assure que la carte montre la question avant de changer de texte
            card.classList.remove('is-flipped');

            // Mise à jour du texte avec un léger délai pour laisser l'animation se faire
            setTimeout(() => {
                qElement.innerHTML = flashcards[currentIndex].q;
                aElement.innerHTML = flashcards[currentIndex].a;
                progress.innerText = `Carte ${currentIndex + 1} / ${flashcards.length}`;
                
                // Demande à MathJax de recalculer l'affichage des formules
                MathJax.typesetPromise();
            }, 200);

            // Gestion de l'état des boutons
            document.getElementById('btn-prev').disabled = currentIndex === 0;
            document.getElementById('btn-next').disabled = currentIndex === flashcards.length - 1;
        }

        function flipCard() {
            document.getElementById('flashcard').classList.toggle('is-flipped');
        }

        function nextCard() {
            if (currentIndex < flashcards.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        // Initialisation au chargement
        window.onload = updateCard;
    </script>
</body>
</html>
