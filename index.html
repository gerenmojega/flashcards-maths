<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards Mathématiques</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --bg-color: #ecf0f1;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 {
            color: var(--primary-color);
            font-size: 1.5rem;
            text-align: center;
        }
        .progress {
            margin-bottom: 20px;
            color: #7f8c8d;
            font-weight: bold;
        }
        .scene {
            width: 100%;
            max-width: 400px;
            height: 250px;
            perspective: 1000px;
            margin-bottom: 30px;
        }
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 15px;
        }
        .card.is-flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 15px;
            background-color: var(--card-bg);
            text-align: center;
            font-size: 1.2rem;
            color: var(--primary-color);
        }
        .card-face-back {
            transform: rotateY(180deg);
            background-color: var(--secondary-color);
            color: white;
            border: 2px solid var(--secondary-color);
        }
        .controls {
            display: flex;
            gap: 15px;
        }
        button {
            padding: 12px 24px;
            font-size: 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #1a252f;
        }
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>Révisions Mathématiques</h1>
    <div class="progress" id="progress">Carte 1 / X</div>

    <div class="scene">
        <div class="card" id="flashcard" onclick="flipCard()">
            <div class="card-face card-face-front" id="question">
                </div>
            <div class="card-face card-face-back" id="answer">
                </div>
        </div>
    </div>

    <div class="controls">
        <button id="btn-prev" onclick="prevCard()">Précédent</button>
        <button id="btn-next" onclick="nextCard()">Suivant</button>
    </div>

    <script>
        // TES CARTES : Tu peux en ajouter autant que tu veux ici en utilisant la syntaxe LaTeX entre \( et \)
        const flashcards = [
            { q: "Quel est le discriminant \(\\Delta\) d'une équation du second degré ?", a: "\\(\\Delta = b^{2} - 4ac\\)" },
            { q: "Identité trigonométrique fondamentale ?", a: "\\(\\sin^{2}\\alpha + \\cos^{2}\\alpha = 1\\)" },
            { q: "Quelle est la dérivée d'un produit \\((f.g)'\\) ?", a: "\\(f'.g + f.g'\\)" },
            { q: "Quelle est la formule du volume d'une boule ?", a: "\\(V = \\frac{4}{3}\\pi R^{3}\\)" },
            { q: "Comment s'écrit un nombre complexe sous forme algébrique ?", a: "\\(z = x + i.y\\)" },
            { q: "Intégration par parties ?", a: "\\(\\int f.g' dx = f.g - \\int f'.g dx\\)" }
        ];

        let currentIndex = 0;

        function updateCard() {
            const card = document.getElementById('flashcard');
            const qElement = document.getElementById('question');
            const aElement = document.getElementById('answer');
            const progress = document.getElementById('progress');

            // Assure que la carte montre la question avant de changer de texte
            card.classList.remove('is-flipped');

            // Mise à jour du texte avec un léger délai pour laisser l'animation se faire
            setTimeout(() => {
                qElement.innerHTML = flashcards[currentIndex].q;
                aElement.innerHTML = flashcards[currentIndex].a;
                progress.innerText = `Carte ${currentIndex + 1} / ${flashcards.length}`;
                
                // Demande à MathJax de recalculer l'affichage des formules
                MathJax.typesetPromise();
            }, 200);

            // Gestion de l'état des boutons
            document.getElementById('btn-prev').disabled = currentIndex === 0;
            document.getElementById('btn-next').disabled = currentIndex === flashcards.length - 1;
        }

        function flipCard() {
            document.getElementById('flashcard').classList.toggle('is-flipped');
        }

        function nextCard() {
            if (currentIndex < flashcards.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        // Initialisation au chargement
        window.onload = updateCard;
    </script>
</body>
</html>
